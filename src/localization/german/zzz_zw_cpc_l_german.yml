# Scripted buttons

	# set max. levels under construction

	zw_auto_invest_level_under_construction_increase_button: "@arrow_up_up! Max Ausbaustufen"
	zw_auto_invest_level_under_construction_increase_button_desc: ""
	zw_auto_invest_level_under_construction_increase_button_effect_1: "$zw_text_auto_invest_level_under_construction$#white #b Aktuelle max. Ausbaustufen: [ROOT.Var('zw_var_auto_invest_level_under_construction').GetValue]\nErneut klicken, um den Wert zu erhöhen.#!#!"
	zw_auto_invest_level_under_construction_increase_button_effect_2: "$zw_text_auto_invest_level_under_construction$#white #b Aktuelle max. Ausbaustufen: Unbegrenzt\nErneut klicken, um den Wert zu erhöhen.#!#!"

	zw_auto_invest_level_under_construction_decrease_button: "@arrow_down_down! Max Ausbaustufen"
	zw_auto_invest_level_under_construction_decrease_button_desc: ""
	zw_auto_invest_level_under_construction_decrease_button_effect_1: "$zw_text_auto_invest_level_under_construction$#white #b Aktuelle max. Ausbaustufen: [ROOT.Var('zw_var_auto_invest_level_under_construction').GetValue]\nErneut klicken, um den Wert zu verringern.#!#!"
	zw_auto_invest_level_under_construction_decrease_button_effect_2: "$zw_text_auto_invest_level_under_construction$#white #b Aktuelle max. Ausbaustufen: Unbegrenzt\nErneut klicken, um den Wert zu verringern.#!#!"

	zw_text_auto_invest_level_under_construction: "Wenn die im Bau befindlichen Stufen eines Gebäudes diesen Wert nicht unterschreiten, sind weitere Stufen durch $zw_text_domestic_private_investment$ von [ROOT.GetCountry.GetNameNoFlag] nicht zulässig.\n\nHierfür muss $zw_text_domestic_private_investment$ zunächst der Bau neuer Gebäude untersagt werden.\n\n"

	# disallowed building types: general toggle

	zw_auto_invest_disallow_building_button: "Beschränkte Gebäudearten "
	zw_auto_invest_disallow_building_button_desc: ""
	zw_auto_invest_disallow_building_button_effect: "[ROOT.GetCountry.GetNameNoFlag]s $zw_text_domestic_private_investment$ dürfen nur erlaubten Gebäudearten bauen\n\nDie [Concept('concept_privatize', '$concept_privatizations$')] unerlaubter Gebäudearten werden #v nicht#! beschränkt."

	zw_auto_invest_disallow_building_undo_button: "Alle Gebäudearten"
	zw_auto_invest_disallow_building_undo_button_desc: ""
	zw_auto_invest_disallow_building_undo_button_effect: "[ROOT.GetCountry.GetNameNoFlag]s $zw_text_domestic_private_investment$ dürfen alle Gebäudearten bauen."

