# Scripted buttons

	# set max. levels under construction

	zw_auto_invest_level_under_construction_increase_button: "@arrow_up_up! Max Expanded Levels"
	zw_auto_invest_level_under_construction_increase_button_desc: ""
	zw_auto_invest_level_under_construction_increase_button_effect_1: "$zw_text_auto_invest_level_under_construction$#white #b Current Max. Expanded Levels: [ROOT.Var('zw_var_auto_invest_level_under_construction').GetValue]\nClick the button again to increase the value.#!#!"
	zw_auto_invest_level_under_construction_increase_button_effect_2: "$zw_text_auto_invest_level_under_construction$#white #b Current Max. Expanded Levels: No Limit\nClick the button again to increase the value.#!#!"

	zw_auto_invest_level_under_construction_decrease_button: "@arrow_down_down! Max Expanded Levels"
	zw_auto_invest_level_under_construction_decrease_button_desc: ""
	zw_auto_invest_level_under_construction_decrease_button_effect_1: "$zw_text_auto_invest_level_under_construction$#white #b Current Max. Expanded Levels: [ROOT.Var('zw_var_auto_invest_level_under_construction').GetValue]\nClick the button again to increase the value.#!#!"
	zw_auto_invest_level_under_construction_decrease_button_effect_2: "$zw_text_auto_invest_level_under_construction$#white #b Current Max. Expanded Levels: No Limit\nClick the button again to decrease the value.#!#!"

	zw_text_auto_invest_level_under_construction: "When a building's levels #b under construction#! are not less than this value, [ROOT.GetCountry.GetNameNoFlag]'s $zw_text_domestic_private_investment$ is not allowed to construct more levels.\n\nMust first disallow $zw_text_domestic_private_investment$ to build new buildings.\n\n"

	# disallowed building types: general toggle

	zw_auto_invest_disallow_building_button: "Restricted Building Types"
	zw_auto_invest_disallow_building_button_desc: ""
	zw_auto_invest_disallow_building_button_effect: "[ROOT.GetCountry.GetNameNoFlag]'s $zw_text_domestic_private_investment$ is not allowed to construct certain building types.\n\nIt does #v not#! affect [Concept('concept_privatize', '$concept_privatizations$')] of the disallowed building types."

	zw_auto_invest_disallow_building_undo_button: "All Building Types"
	zw_auto_invest_disallow_building_undo_button_desc: ""
	zw_auto_invest_disallow_building_undo_button_effect: "All building types are allowed to be built by [ROOT.GetCountry.GetNameNoFlag]'s $zw_text_domestic_private_investment$."

